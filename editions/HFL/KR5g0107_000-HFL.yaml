醫業穩文書宜快吉求官陞職遷移吉利失物難尋托人用事有貴人吉移居不移相逢漸有涯額事稱心懷人稱心上事花落又重開魓魒第三十五中平莫求莫動方隅神殺不堪修舊業安然莫外求塚墓動土尤可畏急於崇福獲洪休鶴鳴霄漢氣冲天九萬程途咫尺間官禄日升財禄進安居吉慶度時光一回去了一回多又再求之色更和二十中間占得此定知財物滿山河聖意云興工動土惡殺臨方不意用宜守舊爲强葬埋更忌恐致滅亡先若少犯祈謝安康公私不利慮有災殃急於崇善可獲吉祥占財買賣置貨好脱貨便脱公事吉守舊三十一第四第十用事出行不利行人不至在外有阻入舍求嗣不利病老少犯土並墓神沉重宜禳謝痘瘡求七十二候謀事成事不利交易難成求醫業不成脱事難失物難尋知信不見遷移不利有小人欺弄公訟不利有災田宅人口有損無益興販不利求官陞職名分不利何處排歌聲分飛是至親一邊一陽照方免淚如傾𩳐魁第三十六下下從舊碌碌躭迷每慢藏一朝無計謾猖狂資財散盡重求福何不當初莫損傷魚鄱桃浪當三月此時方喜變龍身求官得禄須為定百事無憂吉慶新偶逢旱歲種低田水若來時稻不完見説蟲蝗消息事虚驚已退得完全聖意云不自守法常切怠慢火盗一至所威傾散雖悔莫及徒然嗟嘆岀行有失婚姻不求病訟多難好作善事神明叶贊難保興販占財買賣宜就巧忙折本置貨不好脱貨吉種田秧不濟散種有三二分出行達盗火不吉行人至如不至有阻病傷寒七八日得汗過日難宜求家堂祖先土地吃藥好婚姻不利交易不成有人破公訟失理供物有人破遷移不利脱事不利謀事成事凶産子母有損宜保福田宅人口不利文書不利托人用事置貨脱貨俱不利惆悵事忙忙勞心夢一場喪事方出户浪過免災殃𩳐𩲃第三十七下下守静福有基兮禍有胎惟人所召得從來操心不善罹凶變多幸全身也損財渡水無船豈可過波濤凶浪勢嵬峨出入不依如此句進之不得退無他平生為客走途中買賣求財那件通食物用刀君可買須知宜利恁西東聖意云平生毒害福少禍多今罹凶横我將奈何所謀不及問親不和公訟失理興販不磨最宜守舊何必波波占財買賣不濟置貨掣用脱貨吉種田不利病者不吉傷寒瘡痘保佑有救出行不利産難祈福保佑遷移不利借物無興販折本公訟不利文書不利買田宅人口主損失凶求官陞職不遂何處生荆棘佳人信漸踈斷弦聲韻絶家宅更防虚𩳐𩵄第三十八中平因窮疾病厭厭謾可憐醫巫徒費保安全齊心懇告俱成妄何不潛思荅上天紅日當天照破雲無幽不燭衆人傾君子進身須顯達榮華家宅又安寧買物之時物價高便宜出賣莫叨叨雖然才利無多子枉費工夫走一遭聖意云災禍纒綿豈料其源浄願不還難保安全醫巫造説浪費其錢速宜崇善以荅上天先憂後喜先難後易可以作福神能保庇占財置貨莫買脱貨好種田少收病老不吉有天願呪詛星辰不順添病不好出行不利行人至産孕難公訟不吉纒綿婚姻不利遷移不利買田宅人口不利家宅人口宜作善事求醫藝不利失物難尋不見求官陞職不利宜快脱事不濟借物先難後易托人用事先難後易八刀猶未了暗箭射陰人傷人還及己福去禍來侵𩳐䰢第三十九中平防辱莫説英雄禍不侵壯志遭辱恐難禁廻頭改過非為過坦道經求好訪尋忽入深山去路迷不如歸去致狐疑進退出行俱不利切須防損暗中欺貨物雖遲氣色高且宜守舊閲英豪有人領袖方為吉及後錢財旺似刀聖意云每盗强梁輕欺良善惡債難揜遭辱被遣一且改過禍滅禍薦先凶後吉皆由方便此籤非吉速達舊願占財買賣置貨吉脱貨吉種田無收出行不利行人有阻托人用事不濟病者不吉宜保佑婚姻不吉産宜保佑謀事成事宜更改成也不利公訟宜和買舊宅人口不利文書不利遷移不利求醫藝不利求官陞職托人再撫人成借物不利失物宜快遲不見殘花枝漸發月缺再重圓改過神人讚相逢事必完𩳐魓第四十中平後吉中懷毒害少慈人幽顯將恢不孝刊能向道心知革故鎡基有繼在門庭鴻鵠摩天只自然未逢時至致災迍此日升騰還自在翺翔直上九霄雲聞知事已實堪誇此去登門必見華汝若托人終不吉空言世事亂如麻聖意云平生毒害不和六親既化幽顯能向此心誓天悔地革故鼎新占病漸减謀運得通若婚與訟終就和平移凶就吉慶吉門庭占財宜遲有利置貨好脱貨好種田先難後易婚姻不吉病者少有願傷寒七日得汗如遲宜作福家宅人口平安遷移吉走失急尋久遠只在家内文書遲興販吉借物遲利托人用事上緊吉交易遲成利産孕遲吉有無相逢否先防迍塞災回心歸正道免損段頭財𩳐𩳐第四十一中平謹守莫動客路茫茫古驛荒不堪開眼致參商只宜守舊朝昏度庶保怡怡禄有常落花流水兩無情家宅憂疑主不寧小口陰人招疾厄切須急禱旺中神雖然寳出海中者便下番舟走一遭到了不知何處去依然空手赤身回聖意云出行謀望害己損財且宜守舊保爾無災公事和了疾病久懷不宜動土恐有悲哀常驚怪夢百事低回占財無舊有貨好守種田薄收病不問老少多凶少吉宜告斗婚姻不吉公訟宜和出行自己有小失行人至田宅人口頭疋不利文書不濟借物不成失物難尋産孕求保買貨脱貨不利托人用事宜守舊交易難成見喜變為憂占身反作讎出入防損失災訟未能休𩳐魒第四十二大吉欲醒久鈍思磨醉欲醒頓思更變未原情氷消雪散和風至蟄者潜升枯者榮遊魚出水戲波間跳躍優游莫等閑喜遇泰來通萬事更於險難勝於前兵勢休言出世奇陣中成敗少人知戰勝中間還有損争如不戰自相如聖意云久淹如醉多能頻遇蟄不久閉雷聲徐徐冰消雪散和風自至百事如意踪跡伸舒病訟宜福保爾無虞所謀大吉不可躊蹰占財買賣春首有財余月不中置貨好諸事吉種田收出行宜快恐去不成行人三二日至婚姻吉先難後易遷移吉利病老少春瘥快余月遲托人用事宜快脱事宜快家宅人口平安求官陞職吉利昏昏醉欲醒久困漸通亨否極時逢泰勾萌盡發生魒魁第四十三中平應天役役人生七十稀陰陽淫疾速求醫天曹脩短皆前定不與塵凡取次知日出扶桑萬里明貴人喜慶自通亨求財謀望從心意若問求官定得名自古人才志氣高於中有事不交爻機關不漏一些子頃刻成名耀大曹聖意云老者悲傷少者無疑宜作善福庶保怡怡公事平穩謀望稽遲動作平平莫特巧機占財輕置貨好脱貨好種田薄收出行少者安老者危行人至遷移快吉病老者重少者有天曹並善願早還無妨痘瘡主尖交易宜快初婚不吉重婚宜快吉公訟宜快和文書遲成田宅人口頭足俱不利借錢無多謀事成事宜快成産孕平穩宜保佑吉興販快利家宅人口老者危少者安托人用事吉求官陞職名分成脱事宜快遲難走失難尋西山日漸落無色似黄昏屈指傷悲處圖謀空斷魂魒𩲃第四十四上上合天否泰相仍理自然合鄉剛毅合蒼天災衰有命今氷釋降福穰穰志愈堅烏雲遮月暗朦朧暗昩門庭事未中只宜守舊方為吉直待雲開萬事通今日來占此意中速來速去恁西東雖然財物無多子照耀清光滿眼紅聖意云爲人公正窮達如常不介凶次豈不餘殃行藏通泰降福穰穰吉人天相獲福吉昌災害漸退聲譽揚揚所爲叶吉永保安康占財有三分置貨好脫貨好各吉種田好收病老少傷七八日得汗遲瘥交易成出行吉行人未至家宅人口平安婚姻宜快遲難成買田宅人口頭疋宜快遲難成有益文書吉利謀事成事宜快遲費力求醫藝利求官陞職宜快産孕吉公訟吉當年掛布衣今日却坡緋脱去塵凡吉似玉見光輝魒𩵄第四十五大吉屈伸夙有因縁豈暫成那堪占卜覔佳音經求負販情無外晦者斯先屈者伸風雷鼓舞播乾坤萬物萌芽自此伸君子求謀皆遂意庶人人口進家門此意占之得吉祥於中求事見時亨雖然小輩來侵閙大道身軀自吉昌聖意云占親利益夙氣寅緣經求謀望財物綿綿公訟得理病者遲瘥動爲合吉家宅安全行人通泰人月團圓占財有五六分置貨吉脱貨吉遲種田吉婚姻大利出行利行人遲公訟吉田宅人口頭疋遲成脱事吉利謀事成事不稱意産孕吉利求官陞職名分不達借錢有三分脱貨後無價動用吉欲識前途事文書正好求憂危成吉兆終日自然休魒䰢第四十六中平易脱有財山川悠遠歷艱難聚散須知反掌間近涉争知經久利秋深冬首稱心顔螣蛇入夢主憂疑防慎家門有賊欺將來革故方為吉進退如今未遇時求財於我事如何守貨占財守利多大放心懷長久去自然瑛玉有人磨聖意云經求涉遠貪心無厭財物聚散少得十全秋冬有望春夏休言一切謀運事亦如然病者自瘥訟者留連若求安泰宜謝蒼天占財買賣勞心置貨好秋冬吉脱貨快種田不完全婚不吉出行秋吉利行人至公訟難借物秋冬吉病老少春夏得秋方瘥多凶宜善事秋冬病瘥遲買田宅人口頭疋秋冬吉春夏凶謀事成事秋冬吉春夏不吉家宅人口秋冬吉興販文書産孕秋冬俱吉求官陞職秋冬吉托人用事難成脱事上半年不利下半年吉交易秋冬吉餘月不中禾粒方好去用意望雲梯謀望皆好用雲開月正輝魒魓第四十七大吉素秉精誠格至神行藏時獲吉來臨圖謀若也踰邪逕不誤從前道合真密雲無雨天邊暗却主憂疑亦不妨更慎小人來害己家門暗昩事須防求財意欲一亨通争奈才人西復東三五中間雖實有事當併定一遭空聖意云好善獲吉積惡就凶縱當正道福不須求公訟泰定占親無憂所謀皆就出路憂疑百事遂意無有遲留占財買賣正道無利邪道大旺置貨好脱貨好種田大收公訟不吉病老少有阻犯土並祈福保佑不妨婚姻吉利諸事吉利出行吉行人三日至見立未安墳傳書用破心幾回遭險浪今日遇知音魒𩳐第四十八中平陰陽陰陽匹偶不徒然勉强求神積善緣念念孰知遵大義好於財物保安全寳劒新磨益見光東西照耀倍尋常從前自有根基在潤色增明聲播揚欲望平生富益和怎知好事却多魔只宜守舊安居吉自有凌雲志氣多聖意云求謀大吉緣法夙契若有機謀事恐難濟資財善保公事莫易若占家宅且須謹忌病者不妨行者遲滯占財買賣少有置貨好脱貨好求醫業名分不成公訟不吉破財不妨病者善願無妨出行不中行人未至失物後見婚姻遲晩大吉種田薄收占事須防多阻滯求名問卜事難量要卜守舊多安穩自有榮華禄位昌聚四髮成女須憂事不中早園能備禄家眷免災凶魒魒第四十九上上破星石中有玉誰能别沙裏藏金不易淘窮達在時須有得何須懷抱只徒勞群鴉集噪可為奇防慎陰人口舌危退步之時方可得不然事緒主憂疑遲中求事可須遲長久光陰事莫疑財貨久長難可守守之事意實提携聖意云自負才能未遂其至操持堅固何須不濟病者自瘥訟不久滯謀運向前進取得貴百事皆通英風不墜占財買賣遲有四五分種田宜勞力有收失物便見婚姻宜快成吉病有願便還少者好老者不中脱貨宜遲有利忙無利不中公訟宜和無事行人便至家居吉諸事吉門望漸聲高文書得堅牢稱心方可得入海釣魚鰲四聖真君靈籤
