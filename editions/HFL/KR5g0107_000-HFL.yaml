front:
  text: 四聖真君靈籤納一
  hash: sha256:9a106f21fa6830ab3079a4b24d78f107283d1393f1780d1483807b543f37b982
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0107_HFL_000-001a, image: hfl/1010/1010-004.png}
body:
  text: 降靈勸世格言矯妄求榮名譽不揚尅剥致富子孫受殃行思布德福禄來翔寡欲薄私專命爾長毋欺暗室毋昧三光正直無私赤心忠良天地介祉神明衛旁延生度厄必濟時康我言能依百病消洋凡禱之時先念郷貫某處某人爲某事上啓天蓬大元帥真君天猷副元帥真君詡聖保德真君真武靈應真君天地神祇萬物皆知吾今卜課善惡扶持凶應凶兆吉應吉期判斷生死决定無疑魁魁第一籤下下守舊曉來昏去苦營營只見金資不見人縱使畜藏為朽腐直須將久花為塵飛龍變化喜逢時此日昇騰果遂期謀望求財多吉慶求官進位更無疑猛烈將軍朝上闕豈容小意動干戈直須拜謁金門下上下王侯氣色和聖意云逐利哀哀棄真就妄積不能散反報其謗且守其常不宜謀望公訟莫興婚姻必旺病者遲瘥出行阻障動作不及無門可向占秋吉春冬不吉脱貨吉公訟無事買賣出入無利縱有輕微見人費力病五十以下難久淹年少宜早得在床遲無妨犯土瘟瘡不妨暴病少者七日得汗大命吉婚相尅夫入舍凶占頭疋人口凶求醫學藝業不吉走失早晩見遲難尋借物多無少有遷移凶只宜守舊家宅人口有土並禁忌不寧修福保之生産宜快遲難求官陞職大吉脱貨便脱文書未定遲不成托人虚誑買貨便買謀事成事有阻種田無收見貴人便見遲不濟針灸選好日吉惜花還值雨愛月黑雲生筵前無一事猶若是非爭魁𩲃第二大吉動用取進早覔安身保利宜精依古法莫逾時革除所弊人常願果協心懷享大禔虎出大林須動衆衆人見了却憂疑雖然未解傷人意亦主虚驚事可疑山居豈有喧譁客只好修心辦已高萬事於中且寧耐用心燒煉只徒勞聖意云循規守矩如法立身久静思動常切精勤遷移吉利謀運從心結親和合病者從輕百事暢懷公訟欣欣聖籤之守所欲利亨占婚姻吉置貨財輕脱貨吉移居吉公訟無事家宅人口平安求官遲陞職名分宜快病宜作福老者難少者或好或惡服藥有阻痘瘡不穩出行遠宜少人吉行人至如不到兩月方歸失物在宅内宜早尋遲不見人口失吉久後見行人不到一二日有信脱貨脱事便脱後遲孕難生生女修福日下生求醫入學吉托人用事二人方吉交易吉文書有阻後吉借物三人吉買頭疋田宅宜快利有禄重歡慶枯楊半樹開向前求吉事晚日稱心懷魁𩵄第三中平否極泰來用盡殷勤望有功反為讎怨慘愁容須愁寳貨多虚耗何苦區區不守中否極從今喜泰來龍泉磨拂舊塵埃莫言守已無他望閉户深居也獲財居官必有人讒佞得職終須後職高只好在家安守道自然家内遇英豪聖意云時運大謬不能守常殷勤用盡反受其殃失物招禍動作不良凡事求用早計潛藏大主損財宜守其常占買物田宅人口頭疋難見貨快買再去添價不賣有利病老少若不應時先凶後吉宅神不寧婚姻尅夫費力不成種田費力無收守舊脱貨好公訟事難謀事成事難舊基業好新難去失人口頭疋難尋産孕生分娩難子母凶宜作福生男托人用事不濟有阻文書不濟損財遷移不利借物無交易興販不利守舊還逢吉更張必見危鼎身虧一足烹飪但隨時魁䰢第四中平謹守莫言小疾弗須憂日月逡巡不易留能向道中圖早計庶幾危厄獲全收勞心費力欲成功待得花開一陣風須得東君輕借力望中别有一枝紅風催閃電雷為使水中蛟龍旱有妖二物若能俱不避依時順節足為高聖意云謹微守己一心事神舊願早還免受其殃公訟不利莫占婚姻出行宜止在路逡巡財貨平平病者縱免凡合天道先暗後明占病有道願先凶後吉久淹不妨年老難痘瘡宜保福産難宜快先凶後吉買賣微見人宜快有二三分種田早收遲無脱貨快婚姻不吉入舍過房凶出行心動身不動行人二三日至如不至遲公訟吉破財買頭疋快成遲難求官陞職名分遲不遂買物田宅宜快遲不成走失目下見如遲一日不見成事勾當宜快遲更變家宅人口不利保福安托人用事宜貴人遲不成交易難成興販宜快遷移凶借物便借有人阻文書目下見遲不成求醫學業遲難安居且慮危深情有别離未能求善果先防預損枝魁魓第五中平利益動用好將心意共圖謀利益源源合所求休向此中忘善果保全衰朽浪中舟行船風順去無疑利涉江津正遇時萬里長城知可到所謀遂意事如期二人商買求財利便好登途離本地三五七朝到長安貨物交關莫守市聖意云最宜交易同心共謀若占老病危厄孤舟婚姻叶吉謀望可求疾者進退不解無憂行人即至訟不拘留田蠶吉利家道優游占財買賣置貨好合伴不吉公訟無事婚姻吉種田有收出行吉行人早晚至求官陞職利病三五十以用無妨四十以上進退宜快保福痘瘡平穩老者主死買田宅人口頭疋吉家宅老危少安托人用事快吉遷移大吉走失遲見謀事成事三二日宜快幹遲不濟産孕雙日得平安吉脱貨有利便脱興販吉文書交易不成作本成輀用須憑巧匠裁重山成錦綉花落又重開魁𩳐第六大吉存心卦利益動用欲求文墨作基圖何用懷疑設計謨但要存心公且正自然交易利贏餘鴛鴦阻隔兩分飛謀望求財未得時守舊却宜休改革如今進退尚遲疑安居正好村庄内若欲遷移不為慮若逢孤勢也安然利益變財那可對聖意云凡動文墨公訟無失凡在謀望百事安吉問親和合契書進入公訟得理疾病不卒動作徙心萬無一失占財求輕微見謁耐心財不少買貨吉脱貨吉煩事小心公訟吉種田薄收出行宜快行人即至病老不妨少者三二日好久淹難痘瘡平息婚姻好和諧入舍俱吉利家宅人口平安交易便成遲難成買田宅人口大吉謀事成事先難後易産平息生男貴吉求官陞職大利遷移吉利托人用事先難後易文書有氣相吉利魚化龍時變休言霖雨開碧雲重見喜霖雨一聲雷魁魒第七上上佳澤卦二奇動用纔發精神叩上穹沉痾頓瘥有神功非論長幼霑佳澤運用如耕遇歲豐枯木逢春色欲華頓然枝盛長萌芽時人莫得為柴斫若待春深又吐花正去浙東求買賣江西便説有新茶淛東買賣且休去買得茶來錦上花聖意云内秉精專感格易求雖處憂摖奚用多憂病者漸瘥宿疾亦瘳福自天佑從人所修長幼安吉訟不拘留營謀有望耕佈全收占財有三四分置貨勾陳脱貨遲公訟吉移居吉脱事吉托人用事遲成交易走失難尋出行吉行人一二日至病老少無妨宜禱上蒼吉痘瘡平息吉買頭疋田宅人口吉婚姻吉謀事成事勾當有小人無妨破財吉家宅人口平安興販言産平和求官吉未達公卿位青雲可布隨春光無限好映日照瑶池𩲃魁第八下下否蹇守舊艱難基址倦扶持役役貪污不見機畜産損傷為小失更於人口致憂疑因見漁舟上逆灘漁舟泊此且盤桓前灘過了由閑事更有後灘過更難心中用事意難為汝若為之吉自虧正是失財行道處波瀾汹湧没明珠聖意云素有祖業不自守持貪心無厭徒役機關鎡産致損家眷傷悲所謀莫望病者瘥遲訟者失理動涉迍危但宜守舊莫外思惟占財買賣輕微置貨財穩求事不成公訟有主張移居吉脱貨遲種田看時節出行凶行人二三日至如不至財有失災病老凶少淹滯不妨痘瘡難遲瘥交易不利婚姻初婚無妨重婚不中求嗣凶訟先難後易買田宅人口頭疋凶謀事勾當准興販不吉失物難尋人口災晦不吉産孕艱難托人用事難成求官陞職名分遲財寳逢時變如何事不歸手指斜陽日孤舟未肯休𩲃𩲃第九上上享福出塵久思去故與維新恰遇亨嘉志豁伸人宅泰然無别慮韜光晦迹出埃塵蘭芳春景香堪愛菊吐秋香又更佳乾坤各自為情意不解東風次第開兩頭事意問如何只好隨縁恐懼過且守時來不多久雖然不大也摩呵聖意云否極泰來將伸其志久宅安樂出塵拔萃所作所謀爲無不遂守舊平平幾成自墜交易無阻田蚕周備更改動用必獲如意占求財更改則吉置貨吉脱貨吉移居吉公訟吉諸事少成種田三二收婚姻初婚吉重婚平平求嗣吉出行吉行人二三日至病老者難少者久淹亦難痘瘡祈福吉公訟吉置田宅人口頭疋吉利謀事成事宜快勾當有失物便尋遲不見求官陞職不達家宅人口平安借物休言産孕平穩文書遲吉交易遲不成托人用事恐不成興販大吉累月多逢雨光華始晩晴舉頭天上看昏月漸分明𩲃𩵄第十上上吉祥美譽洋洋襲吉祥門庭嘉慶喜非常鳳凰呈瑞何由致德行光榮世代昌不論平地與山尖無限春光緫被沽採得百華成蜜後為誰辛苦為誰甜黄榜招賢膽氣諧正宜春色入門來得官終是為官顯不若家間穩得財聖意云君子道長小人道消求名得遂顯達皇朝孕生貴子後慶豐饒投書獻策棲占先標常人所占未可圖超依稀守舊幸免災妖占財君子貴人有小人輕微置貨吉脱貨便脱移居吉公訟吉種田看時節平平交易便成遲不濟家宅人口平安出行吉小人守舊行人一二日至病老少艱難痘瘡亦然婚姻君子貴人初重婚吉入舍求嗣吉小平興販吉買田宅人口頭疋君子吉小人難文書貴人吉小人不利謀事成事君子顯小人元用産君子生貴小人主離借物君子吉小人無用失物慢慢尋遷移吉求醫學業吉托人用事吉小人不濟求官陞職除授吉做事好寢心安身日漸榮殘花如舊色前朶足豐盈𩲃䰢第十一上上勤持動用莫傷蹤跡久塵淪幸有真儒席上珍守節不應常遁晦竚看砥礪喜通津囚人出獄争訟了却買甜瓜上酒樓偶見故人同暢飲酒錢還了又相酬去時事意何能速若奔長安三日程不若在家聽消息事須自己見光榮聖意云懷才抱藝久困塵埃時將得路亨達有謀最宜圖望不可能徊婚姻平穩公訟無失不宜守舊恐有卑摧占財儒士買賣有十分置貨財輕脱貨好脱移居不吉公訟吉諸事阻節行人三二日至如不至有實信出行吉利病者差三五日不妨久淹有善願痘瘡吉婚姻吉入舍求財吉公訟宜和買物田宅人口頭疋有阻准成産孕生貴子平穩諸事成事宜快遲難勾當托人向前吉家宅人口平安文書有氣相交易宜快遲不成遷移興販吉求醫求官陞職名分吉借物宜快有人破自有必中意何人若得知龍飛方見澗霖雨正當時𩲃魓第十二下下污行不明污行欺心昩彼蒼鬼神常切守行藏若教慢易能徼福不向人間别善良楊花風捲無消息恰似襄王一夢中夜静月眀風細處空飄零落惹芳叢可知笑殺人間客昨見他貧却有錢若不用心終不得須知已後得週全聖意云内外傾欺鬼神不佑凡事動作必懽凶咎若謀若爲舉難成就消譴謝過庶禳容咎舉動未遂且宜守舊此籤大吉百事皆謬占財買賣置貨吉脱貨好有財公訟吉移居不吉幫四二十六四十八三十四用事出行主有災行人三二日到如不至在外有事病老少犯土並呪愿出宗在外有家先求之新願早還遲難保痘瘡凶保息吉婚姻入舍大凶求達陞職名分不達買田宅人口頭疋不吉謀事成事勾當俱不利産孕難家宅人口不寧宜保福托人為事不濟人物難尋通達翻為厄憂疑亦緊懷奈河迍未過祈福免凶災𩲃𩳐第十三中平堅勤守舊立性恭勤不慢神與人交易自均平如何動得寃讎報孰若收心且守成花開結子喜逢時賴得春工造化機求望所謀皆遂意衣錦還郷事可期事意長時時意長中間一段最高强依時可用無心慢衣錦還郷拜父娘聖意云素懷敬信不慢於神行止公正不欺於人人將歸怨反累其身何如求静且守其真不宜謀望守舊惟新占財平置貨不吉動用不吉公訟不吉種田看時節出行不利行人未至病不問老少久淹寧公耐時急難脱祈福保佑痘瘡亦然婚姻入舍求嗣平平走失耐心後見買田宅人口頭疋宜